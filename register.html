<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Create account / Social Platform</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">S</div>
        <div class="auth-title">Create your account</div>
        <div class="auth-subtitle">Join the social platform </div>

        <div id="noticeBox" aria-live="polite"></div>

        <form id="registerForm" novalidate>
            <label for="username">Username</label>
            <input
                    id="username"
                    name="username"
                    type="text"
                    placeholder="e.g. saleh"
                    required
                    autocomplete="username"
            />
            <div class="field-help">Use at least 3 characters.</div>

            <label for="email">Email</label>
            <input
                    id="email"
                    name="email"
                    type="email"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
            />

            <label for="password">Password</label>
            <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="8+ chars with letters and numbers"
                    required
                    autocomplete="new-password"
            />
            <div class="field-help">Use at least 8 characters with letters and numbers.</div>

            <label for="confirmPassword">Confirm Password</label>
            <input
                    id="confirmPassword"
                    name="confirmPassword"
                    type="password"
                    placeholder="Re-enter your password"
                    required
                    autocomplete="new-password"
            />

            <div class="auth-actions">
                <button class="btn primary" id="registerBtn" type="submit">Register</button>
                <a class="auth-alt" href="login.html">Already have an account?</a>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { register } from "./js/auth.js";
    import { showNotice } from "./js/ui.js";

    const registerForm = document.getElementById("registerForm");
    const username = document.getElementById("username");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const noticeBox = document.getElementById("noticeBox");

    function submitForm() {
        const usernameValue = username.value.trim();
        const emailValue = email.value.trim();
        const passwordValue = password.value;
        const confirmPasswordValue = confirmPassword.value;

        if (!usernameValue || !emailValue || !passwordValue || !confirmPasswordValue) {
            return showNotice(noticeBox, "Please fill in all fields.", "err");
        }

        if (usernameValue.length < 3) {
            return showNotice(noticeBox, "Username must be at least 3 characters long.", "err");
        }

        if (passwordValue !== confirmPasswordValue) {
            return showNotice(noticeBox, "Passwords do not match.", "err");
        }

        const res = register({
            username: usernameValue,
            email: emailValue,
            password: passwordValue
        });

        if (!res.ok) {
            return showNotice(noticeBox, res.error, "err");
        }

        showNotice(noticeBox, "Account created successfully. Redirecting to login...", "ok");
        setTimeout(() => {
            window.location.href = "login.html";
        }, 700);
    }

    registerForm.addEventListener("submit", (event) => {
        event.preventDefault();
        submitForm();
    });
</script>
</body>
</html>
